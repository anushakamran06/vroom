<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N.ext Feed</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="logo">N<span class="dot">.</span>ext</div>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Settings panel (hidden by default) -->
  <section id="settings-panel" class="panel hidden">
    <h2>Sources</h2>
    <div class="toggle-list" id="source-toggles"></div>
    <button id="clear-all-btn" class="danger-btn">Clear all alerts</button>
  </section>

  <!-- Main feed -->
  <main id="feed-container">
    <div id="empty-state" class="hidden">
      <p>No new opportunities yet.</p>
      <p class="sub">Visit Canvas or TalentConnect to trigger scraping, or wait for the next background refresh.</p>
    </div>
    <ul id="feed-list"></ul>
  </main>

  <script src="popup.js"></script>
</body>
</html>
